name: NeuroAntiSpam Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-bot:
    name: Deploy & Run Bot
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Just under the 6-hour GitHub Actions limit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        working-directory: bot
        run: pip install -r requirements.txt

      - name: Run NeuroAntiSpam Bot
        working-directory: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
          SUPER_ADMINS: ${{ secrets.SUPER_ADMINS }}
        run: python main.py

  update-spam-db:
    name: Update Global Spam Database
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Update spam phrases from community
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_spam_db.py

      - name: Commit updated database
        run: |
          git config --global user.name "NeuroAntiSpam Bot"
          git config --global user.email "bot@neuroantispam.com"
          git add database/global_spam_phrases.json || true
          git diff --staged --quiet || git commit -m "🤖 Auto-update spam database [skip ci]"
          git push || true
